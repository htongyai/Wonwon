name: shared
description: "Shared code for WonWon Repair Finder apps"
publish_to: 'none'
version: 2.2.3

environment:
  sdk: ^3.7.2
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^3.13.1
  cloud_firestore: ^5.6.8
  firebase_auth: ^5.5.4
  firebase_storage: ^12.4.6
  firebase_analytics: ^11.6.0

  # State management
  provider: ^6.1.2
  get_it: ^7.6.7
  flutter_bloc: ^8.1.4
  equatable: ^2.0.5

  # Data/serialization
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.1

  # UI
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.7.0
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
  flutter_cache_manager: ^3.3.1
  shimmer: ^3.0.0

  # Maps & Location
  flutter_map: ^8.1.1
  latlong2: ^0.9.1
  google_maps_flutter: ^2.12.2
  location: ^8.0.0
  geolocator: ^14.0.0
  geolocator_web: ^4.1.3
  geocoding: ^4.0.0

  # Utilities
  shared_preferences: ^2.2.2
  url_launcher: ^6.3.1
  permission_handler: ^12.0.0+1
  uuid: ^4.5.1
  image_picker: ^1.1.2
  image_cropper: ^9.1.0
  flutter_image_compress: ^2.4.0
  path_provider: ^2.1.2
  crypto: ^3.0.3
  dio: ^5.4.0
  visibility_detector: ^0.4.0+2
  file_picker: ^10.1.9
  excel: ^4.0.6
  intl: ^0.20.2
  package_info_plus: ^8.3.0
  fl_chart: ^0.68.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  freezed: ^2.4.7

flutter:
  uses-material-design: true
