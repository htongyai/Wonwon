name: wonwon_dashboard
description: "WonWon Repair Finder - Admin Dashboard"
publish_to: 'none'
version: 2.2.4

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # Shared package
  shared:
    path: ../../packages/shared

  # Dashboard-specific dependencies
  provider: ^6.1.2
  firebase_core: ^3.13.1
  cloud_firestore: ^5.6.8
  firebase_auth: ^5.5.4
  firebase_storage: ^12.4.6
  fl_chart: ^0.68.0
  font_awesome_flutter: ^10.7.0
  google_fonts: ^6.1.0
  intl: ^0.20.2
  package_info_plus: ^8.3.0
  excel: ^4.0.6
  file_picker: ^10.1.9
  csv: ^6.0.0
  cached_network_image: ^3.3.1
  geocoding: ^4.0.0
  geolocator: ^14.0.0
  shimmer: ^3.0.0
  url_launcher: ^6.3.1
  uuid: ^4.5.1
  image_picker: ^1.1.2
  image_cropper: ^9.1.0
  google_maps_flutter: ^2.12.2
  flutter_map: ^8.1.1
  latlong2: ^0.9.1
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lang/
